openapi: 3.0.0
info:
  title: Pipeline Sentry Fivetran Tool
  version: 1.0.0
paths:
  /fivetran/connectors/broken:
    get:
      summary: Retrieves a list of Fivetran connectors that are currently failing or broken.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    error_message:
                      type: string